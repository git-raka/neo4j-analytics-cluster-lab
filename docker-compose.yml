services:
  tx1:
    image: ${NEO4J_IMAGE}
    hostname: tx1
    user: "${USER_ID}:${GROUP_ID}"
    restart: unless-stopped
    networks:
      neo4j-cluster:
        aliases:
          - neo4j-network
    ports:
      - "${TX1_HTTP_PORT}:7474"
      - "${TX1_BOLT_PORT}:7687"
    volumes:
      - ./neo4j.conf:/conf/neo4j.conf
      - ./data/tx1:/data
      - ./logs/tx1:/logs
      - ./conf/tx1:/conf
      - ./import/tx1:/import
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      EXTENDED_CONF: "yes"
      NEO4J_EDITION: "docker_compose"
      NEO4J_server_bolt_advertised__address: "${ADVERTISED_HOST}:${TX1_BOLT_PORT}"
      NEO4J_server_http_advertised__address: "${ADVERTISED_HOST}:${TX1_HTTP_PORT}"
      NEO4J_initial_server_mode__constraint: "PRIMARY"
      NEO4J_initial_server_tags: "transactional"
      NEO4J_initial_dbms_default__primaries__count: "3"
      NEO4J_initial_dbms_default__secondaries__count: "2"
      NEO4J_server_memory_heap_initial__size: "${TX_HEAP}"
      NEO4J_server_memory_heap_max__size: "${TX_HEAP}"
      NEO4J_server_memory_pagecache_size: "${TX_PAGECACHE}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  tx2:
    image: ${NEO4J_IMAGE}
    hostname: tx2
    user: "${USER_ID}:${GROUP_ID}"
    restart: unless-stopped
    networks:
      neo4j-cluster:
