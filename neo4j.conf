# Shared cluster settings based on the official Docker clustering tutorial:
# https://neo4j.com/docs/operations-manual/current/tutorial/tutorial-clustering-docker/

server.default_listen_address=0.0.0.0
server.default_advertised_address=$(hostname)

dbms.cluster.discovery.resolver_type=DNS
dbms.cluster.endpoints=neo4j-network:6000
# On a single Docker host, bootstrapping the system database with all
# primaries simultaneously can deadlock; allow the first primary to seed it.
dbms.cluster.minimum_initial_system_primaries_count=1

server.cluster.advertised_address=$(hostname -i)
server.cluster.raft.advertised_address=$(hostname)

dbms.routing.enabled=true
dbms.routing.default_router=SERVER
server.routing.advertised_address=$(hostname)

# Keep GDS defaults in the shared config so the plugin installer does not
# rewrite neo4j.conf and relax its permissions during container startup.
dbms.security.procedures.unrestricted=gds.*
